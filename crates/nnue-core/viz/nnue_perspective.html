<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>NNUE Perspective Visualizer</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: system-ui, sans-serif;
            background: #1a1a2e;
            color: #eee;
            padding: 30px;
            min-height: 100vh;
        }
        h1 { color: #4fc3f7; margin-bottom: 10px; }
        h2 { color: #81c784; margin: 30px 0 15px; font-size: 18px; }
        .subtitle { color: #888; margin-bottom: 30px; }
        
        .boards {
            display: flex;
            gap: 40px;
            flex-wrap: wrap;
            margin-bottom: 40px;
            align-items: center;
        }
        .board-container {
            background: #252540;
            padding: 20px;
            border-radius: 12px;
        }
        .board-container h3 {
            text-align: center;
            margin-bottom: 10px;
            color: #fff;
            font-size: 16px;
        }
        .board-container .step {
            text-align: center;
            color: #888;
            font-size: 12px;
            margin-bottom: 10px;
            min-height: 18px;
        }
        
        .board {
            display: grid;
            grid-template-columns: repeat(8, 45px);
            grid-template-rows: repeat(8, 45px);
            border: 2px solid #444;
        }
        .square {
            width: 45px;
            height: 45px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            position: relative;
        }
        .light { background: #eeeed2; }
        .dark { background: #769656; }
        .sq-num {
            position: absolute;
            top: 1px;
            left: 2px;
            font-size: 9px;
            color: rgba(0,0,0,0.5);
            font-weight: bold;
        }
        
        .white-piece { color: #fff; text-shadow: 0 1px 2px #000, 0 0 1px #000; }
        .black-piece { color: #000; }
        
        .highlight-wk { box-shadow: inset 0 0 0 3px #2196f3; }
        .highlight-bk { box-shadow: inset 0 0 0 3px #f44336; }
        .highlight-pawn { box-shadow: inset 0 0 0 3px #4caf50; }
        
        .arrow {
            font-size: 30px;
            color: #666;
        }
        
        .legend {
            display: flex;
            gap: 30px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
        }
        .legend-box {
            width: 24px;
            height: 24px;
            border-radius: 4px;
        }
        .legend-wk { box-shadow: inset 0 0 0 3px #2196f3; background: #eeeed2; }
        .legend-bk { box-shadow: inset 0 0 0 3px #f44336; background: #769656; }
        .legend-pawn { box-shadow: inset 0 0 0 3px #4caf50; background: #eeeed2; }
        
        .explanation {
            background: #252540;
            padding: 20px;
            border-radius: 8px;
            margin-top: 20px;
            line-height: 1.8;
            max-width: 1000px;
        }
        .explanation code {
            background: #3a3a5a;
            padding: 2px 6px;
            border-radius: 4px;
            color: #81c784;
        }
        
        .section-label {
            background: #333;
            padding: 8px 16px;
            border-radius: 6px;
            margin-bottom: 15px;
            display: inline-block;
        }
    </style>
</head>
<body>
    <h1>NNUE Perspective & ORIENT_TBL</h1>
    <p class="subtitle">Position: White King b1, Black King f8, White Pawn e4</p>
    
    <div class="legend">
        <div class="legend-item"><div class="legend-box legend-wk"></div> White King</div>
        <div class="legend-item"><div class="legend-box legend-bk"></div> Black King</div>
        <div class="legend-item"><div class="legend-box legend-pawn"></div> Pawn</div>
    </div>

    <h2>GROUND TRUTH (same board for both perspectives)</h2>
    <div class="boards" id="ground-truth"></div>

    <h2>WHITE'S PERSPECTIVE (reference = White King)</h2>
    <div class="boards" id="white-boards"></div>
    
    <h2>BLACK'S PERSPECTIVE (reference = Black King)</h2>
    <div class="boards" id="black-boards"></div>

    <div class="explanation" id="explanation"></div>

    <script>
        // Position: WK on b1 (1), BK on f8 (61), WP on e4 (28)
        const WK = 1, BK = 61, PAWN = 28;
        
        function sqName(sq) {
            return 'abcdefgh'[sq % 8] + (Math.floor(sq / 8) + 1);
        }
        
        function createBoard(container, title, step, pieces) {
            const boardContainer = document.createElement('div');
            boardContainer.className = 'board-container';
            
            const h3 = document.createElement('h3');
            h3.textContent = title;
            boardContainer.appendChild(h3);
            
            const stepEl = document.createElement('div');
            stepEl.className = 'step';
            stepEl.textContent = step || '';
            boardContainer.appendChild(stepEl);
            
            const board = document.createElement('div');
            board.className = 'board';
            
            // Always render rank 8 at top, rank 1 at bottom (standard view)
            for (let rank = 7; rank >= 0; rank--) {
                for (let file = 0; file < 8; file++) {
                    const sq = rank * 8 + file;
                    const div = document.createElement('div');
                    const isLight = (rank + file) % 2 === 1;
                    div.className = 'square ' + (isLight ? 'light' : 'dark');
                    
                    const num = document.createElement('span');
                    num.className = 'sq-num';
                    num.textContent = sq;
                    div.appendChild(num);
                    
                    if (pieces.wk === sq) {
                        const p = document.createElement('span');
                        p.className = 'white-piece';
                        p.textContent = '♔';
                        div.appendChild(p);
                        div.classList.add('highlight-wk');
                    }
                    if (pieces.bk === sq) {
                        const p = document.createElement('span');
                        p.className = 'black-piece';
                        p.textContent = '♚';
                        div.appendChild(p);
                        div.classList.add('highlight-bk');
                    }
                    if (pieces.pawn === sq) {
                        const p = document.createElement('span');
                        p.className = 'white-piece';
                        p.textContent = '♙';
                        div.appendChild(p);
                        div.classList.add('highlight-pawn');
                    }
                    
                    board.appendChild(div);
                }
            }
            
            boardContainer.appendChild(board);
            container.appendChild(boardContainer);
        }
        
        function addArrow(container, text) {
            const wrapper = document.createElement('div');
            wrapper.style.textAlign = 'center';
            
            const arrow = document.createElement('div');
            arrow.className = 'arrow';
            arrow.textContent = '→';
            wrapper.appendChild(arrow);
            
            if (text) {
                const label = document.createElement('div');
                label.style.fontSize = '11px';
                label.style.color = '#888';
                label.style.marginTop = '5px';
                label.textContent = text;
                wrapper.appendChild(label);
            }
            
            container.appendChild(wrapper);
        }
        
        // GROUND TRUTH
        const gtContainer = document.getElementById('ground-truth');
        createBoard(gtContainer, 'Actual Position', 
            `WK: b1 (${WK}) | BK: f8 (${BK}) | Pawn: e4 (${PAWN})`,
            { wk: WK, bk: BK, pawn: PAWN });
        
        // WHITE'S PERSPECTIVE
        const whiteContainer = document.getElementById('white-boards');
        
        // Step 1: Start with ground truth
        createBoard(whiteContainer, 'Start', 'Same as ground truth', 
            { wk: WK, bk: BK, pawn: PAWN });
        
        // Check: WK on b1 (file b = 1) is LEFT half → mirror!
        addArrow(whiteContainer, 'WK on file b (left)\napply ^7');
        
        // Step 2: Apply ^7 mirror
        const wkM = WK ^ 7;       // 1 ^ 7 = 6 (g1)
        const bkM = BK ^ 7;       // 61 ^ 7 = 58 (c8)
        const pawnM = PAWN ^ 7;   // 28 ^ 7 = 31 (h4)
        createBoard(whiteContainer, 'After ^7 (mirror)', 
            `WK: g1 (${wkM}) | BK: c8 (${bkM}) | Pawn: h4 (${pawnM})`,
            { wk: wkM, bk: bkM, pawn: pawnM });
        
        // BLACK'S PERSPECTIVE
        const blackContainer = document.getElementById('black-boards');
        
        // Step 1: Start with ground truth
        createBoard(blackContainer, 'Start', 'Same as ground truth',
            { wk: WK, bk: BK, pawn: PAWN });
        
        addArrow(blackContainer, 'apply ^56\n(vertical flip)');
        
        // Step 2: Apply ^56 flip
        const wkF = WK ^ 56;       // 1 ^ 56 = 57 (b8)
        const bkF = BK ^ 56;       // 61 ^ 56 = 5 (f1)
        const pawnF = PAWN ^ 56;   // 28 ^ 56 = 36 (e5)
        createBoard(blackContainer, 'After ^56 (flip)', 
            `WK: b8 (${wkF}) | BK: f1 (${bkF}) | Pawn: e5 (${pawnF})`,
            { wk: wkF, bk: bkF, pawn: pawnF });
        
        // Check: BK now at f1 (file f = 5) is RIGHT half → no mirror needed
        addArrow(blackContainer, 'BK on file f (right)\nno mirror');
        
        // Step 3: Final (same as after flip)
        createBoard(blackContainer, 'Final', 
            `BK on right half, done!`,
            { wk: wkF, bk: bkF, pawn: pawnF });
        
        // Explanation
        document.getElementById('explanation').innerHTML = `
            <strong>The Two Transforms:</strong><br><br>
            
            <strong>1. ^56 (Vertical Flip) — Black's perspective only</strong><br>
            • Flips ranks: rank 1 ↔ rank 8, rank 2 ↔ rank 7, etc.<br>
            • Makes Black's pieces appear "at the bottom" in their mental model<br>
            • <code>new_sq = old_sq XOR 56</code><br><br>
            
            <strong>2. ^7 (Horizontal Mirror) — ORIENT_TBL</strong><br>
            • Only applied if YOUR reference king is on files a-d (left half)<br>
            • Mirrors files: a ↔ h, b ↔ g, c ↔ f, d ↔ e<br>
            • <code>new_sq = old_sq XOR 7</code><br><br>
            
            <strong>Why?</strong><br>
            • King on a1 with pawn on b2 is strategically identical to king on h1 with pawn on g2<br>
            • Instead of learning both patterns, we always project king to right half<br>
            • This cuts the feature space in half (32 king buckets instead of 64)<br><br>
            
            <strong>Key Point:</strong> Only the reference king (YOUR king) determines if mirror is applied.
            Other pieces can end up anywhere — they just mirror along with everything else.
        `;
    </script>
</body>
</html>
